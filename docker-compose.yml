services:
  db:
    image: mysql:8.0
    container_name: marketplace-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: marketplace
      MYSQL_USER: marketplace_user
      MYSQL_PASSWORD: marketplace_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - marketplace_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: marketplace-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: marketplace_user
      DB_PASSWORD: marketplace_password
      DB_NAME: marketplace
      JWT_SECRET: change-this-docker-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_REFRESH_TTL_DAYS: 7
      ALLOWED_ORIGINS: http://localhost:8080
      UPLOAD_DIR: uploads/
      MAX_FILE_SIZE: 2097152
      WHATSAPP_NUMBER: 6281234567890
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - marketplace_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: marketplace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - marketplace_net

volumes:
  mysql_data:
  backend_uploads:

networks:
  marketplace_net:
    driver: bridge
