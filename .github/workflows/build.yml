name: Build and Validate

on:
  push:
    branches: [main, master, work]
  pull_request:
    branches: [main, master, work]

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci || npm install
      - name: Syntax check
        run: |
          node -c server.js
          for f in controllers/*.js routes/*.js repositories/*.js middleware/*.js services/*.js validators/*.js helpers/*.js config/*.js; do
            node -c "$f"
          done
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build
        env:
          VITE_API_URL: http://localhost:5000
          VITE_SITE_NAME: Marketplace
          VITE_SITE_TAGLINE: Multi User Marketplace
          VITE_CURRENCY: IDR
          VITE_CURRENCY_SYMBOL: Rp
          VITE_SUPPORT_EMAIL: support@example.com
          VITE_WHATSAPP_NUMBER: 6281234567890
        run: npm run build
